name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Create venv and install deps
        run: |
          uv venv
          . .venv/bin/activate
          uv pip install -r requirements.txt
          uv pip install pytest pre-commit ruff mypy pylint bandit
          uv pip install -e .

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v --tb=short

      - name: Type check (mypy)
        run: |
          . .venv/bin/activate
          mypy src/

      - name: Pylint
        run: |
          . .venv/bin/activate
          pylint src/ --fail-under=6 --reports=no

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-